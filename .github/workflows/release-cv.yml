name: Release CV PDF

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

concurrency:
  group: release-cv
  cancel-in-progress: true

jobs:
  release-cv:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Sync CV inputs
        run: node scripts/sync-cv.mjs

      - name: Build CV PDF
        uses: xu-cheng/texlive-action@v3
        with:
          texlive_version: 2025
          run: |
            cd cv
            latexmk -pdf -interaction=nonstopmode -halt-on-error main.tex
            latexmk -c
            cp main.pdf Zenan_Chen_CV.pdf

      - name: Publish rolling CV release
        uses: ncipollo/release-action@v1
        with:
          tag: cv-latest
          name: Latest CV
          artifacts: cv/Zenan_Chen_CV.pdf
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          body: Automated CV build from `${{ github.sha }}`.
